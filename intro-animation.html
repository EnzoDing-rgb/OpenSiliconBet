<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>OpenSiliconBet · Intro</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #0f172a;
    font-family: "Noto Sans CJK SC","PingFang SC","Microsoft YaHei",sans-serif;
  }
  #root { width: 100%; height: 100%; }

  :root {
    --brand: #863bff;
    --brand-light: #a76eff;
    --brand-dark: #6a1fdb;
  }

  @keyframes pulse-glow {
    0%, 100% { filter: drop-shadow(0 0 8px var(--brand)); }
    50% { filter: drop-shadow(0 0 20px var(--brand-light)); }
  }

  .face-img {
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: 50%;
  }
  .face-placeholder {
    width: 100%; height: 100%;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--brand-dark), var(--brand));
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 48px; font-weight: bold;
  }
  .no-record { display: none; }
</style>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://s4.zstatic.net/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://s4.zstatic.net/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://s4.zstatic.net/ajax/libs/babel-standalone/7.26.10/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useContext, useRef, useCallback, createContext } = React;

// ═══ animations.jsx — Stage + Sprite + Easing ═══
const TimeContext = createContext({ time: 0, duration: 10, playing: false });
const SpriteContext = createContext(null);

const Easing = {
  linear: t => t,
  expoOut: t => t === 1 ? 1 : 1 - Math.pow(2, -10 * t),
  overshoot: t => {
    const c1 = 1.70158, c3 = c1 + 1;
    return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
  },
};

function interpolate(t, input, output, easing) {
  const [inStart, inEnd] = input;
  const [outStart, outEnd] = output;
  if (t <= inStart) return outStart;
  if (t >= inEnd) return outEnd;
  let progress = (t - inStart) / (inEnd - inStart);
  if (easing) progress = easing(progress);
  return outStart + (outEnd - outStart) * progress;
}

function useSprite() {
  const s = useContext(SpriteContext);
  return s ? s : { t: 0, elapsed: 0, duration: 0 };
}

function Stage({ duration = 10, width = 1920, height = 1080, loop = true, children }) {
  const [time, setTime] = useState(0);
  const [playing, setPlaying] = useState(true);
  const [scale, setScale] = useState(1);
  const rafRef = useRef(null);

  const effectiveLoop = (typeof window !== 'undefined' && window.__recording) ? false : loop;

  useEffect(() => {
    function updateScale() {
      const s = Math.min(window.innerWidth / width, window.innerHeight / height);
      setScale(s);
    }
    updateScale();
    window.addEventListener('resize', updateScale);
    return () => window.removeEventListener('resize', updateScale);
  }, [width, height]);

  useEffect(() => {
    window.__seek = (t) => { setTime(Math.max(0, Math.min(duration, t))); setPlaying(false); };
    return () => { delete window.__seek; };
  }, [duration]);

  useEffect(() => {
    if (!playing) return;
    let cancelled = false;
    let last = null;
    function tick(now) {
      if (cancelled) return;
      if (last === null) { last = now; window.__ready = true; }
      const delta = (now - last) / 1000;
      last = now;
      setTime(prev => {
        const next = prev + delta;
        if (next >= duration) return effectiveLoop ? 0 : duration - 0.001;
        return next;
      });
      rafRef.current = requestAnimationFrame(tick);
    }
    const startAfterFonts = () => { if (!cancelled) rafRef.current = requestAnimationFrame(tick); };
    if (document.fonts && document.fonts.ready) document.fonts.ready.then(startAfterFonts);
    else startAfterFonts();
    return () => { cancelled = true; cancelAnimationFrame(rafRef.current); };
  }, [playing, duration, effectiveLoop]);

  const handleSeek = useCallback((e) => {
    const rect = e.currentTarget.getBoundingClientRect();
    setTime(Math.max(0, Math.min(duration, ((e.clientX - rect.left) / rect.width) * duration)));
    setPlaying(false);
  }, [duration]);

  const progress = time / duration;
  const ctx = { time, duration, playing, setPlaying, setTime };

  return (
    <TimeContext.Provider value={ctx}>
      <div style={{ position:'fixed', inset:0, display:'flex', flexDirection:'column', background:'#000' }}>
        <div style={{ flex:1, position:'relative', overflow:'hidden' }}>
          <div style={{
            position:'absolute', top:'50%', left:'50%', width, height, background:'#0f172a',
            transform:`translate(-50%,-50%) scale(${scale})`, overflow:'hidden',
          }}>
            {children}
          </div>
        </div>
        {!window.__recording && (
          <div className="no-record" style={{
            position:'fixed', bottom:0, left:0, right:0,
            background:'rgba(0,0,0,0.8)', backdropFilter:'blur(10px)',
            padding:'10px 20px', display:'flex', alignItems:'center', gap:16,
            color:'#fff', fontSize:12, zIndex:999,
          }}>
            <button style={{ background:'none', border:'1px solid rgba(255,255,255,0.3)', color:'#fff', padding:'4px 12px', borderRadius:4, cursor:'pointer' }}
              onClick={() => setPlaying(p => !p)}>{playing ? '⏸ 暂停' : '▶ 播放'}</button>
            <button style={{ background:'none', border:'1px solid rgba(255,255,255,0.3)', color:'#fff', padding:'4px 12px', borderRadius:4, cursor:'pointer' }}
              onClick={() => setTime(0)}>⏮ 重播</button>
            <span style={{ fontFamily:'monospace', fontVariantNumeric:'tabular-nums', minWidth:80 }}>{time.toFixed(1)}s / {duration.toFixed(0)}s</span>
            <div style={{ flex:1, height:4, background:'rgba(255,255,255,0.2)', borderRadius:2, position:'relative', cursor:'pointer' }}
              onMouseDown={handleSeek}>
              <div style={{ position:'absolute', top:0, left:0, height:'100%', background:'#fff', borderRadius:2, width:`${progress*100}%` }} />
            </div>
          </div>
        )}
      </div>
    </TimeContext.Provider>
  );
}

function Sprite({ start = 0, end, children, style }) {
  const { time } = useContext(TimeContext);
  const actualEnd = end == null ? Infinity : end;
  if (time < start || time >= actualEnd) return null;
  const dur = actualEnd - start;
  const elapsed = time - start;
  const t = dur === 0 ? 1 : Math.max(0, Math.min(1, elapsed / dur));
  return (
    <SpriteContext.Provider value={{ t, elapsed, duration: dur, start, end: actualEnd }}>
      <div style={{ position:'absolute', inset:0, ...style }}>{children}</div>
    </SpriteContext.Provider>
  );
}

// ═══ Shared: Scene Wrapper ═══
function SceneWrap({ children, opacity = 1 }) {
  return (
    <div style={{
      position:'absolute', inset:0,
      display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
      background:'radial-gradient(ellipse at center, #1e293b 0%, #0f172a 70%)',
      opacity,
    }}>
      {children}
    </div>
  );
}

function SectionLabel({ children, color = '#863bff' }) {
  return (
    <div style={{
      fontSize:36, fontWeight:600, color, letterSpacing:'0.2em', marginBottom:48,
      fontFamily:'"Noto Sans CJK SC",sans-serif',
    }}>
      {children}
    </div>
  );
}

// ═══ Scene 1: Title (0-6.5s) ═══
function TitleScene() {
  const { elapsed } = useSprite();
  const logoScale = interpolate(elapsed, [0.3, 1.7], [0.5, 1], Easing.overshoot);
  const logoOpacity = interpolate(elapsed, [0, 1.2], [0, 1], Easing.expoOut);
  const titleOpacity = interpolate(elapsed, [1.7, 3.6], [0, 1], Easing.expoOut);
  const subOpacity = interpolate(elapsed, [3.6, 5.0], [0, 1], Easing.expoOut);
  const exit = elapsed > 5.5 ? interpolate(elapsed, [5.5, 6.5], [1, 0], Easing.expoOut) : 1;

  return (
    <SceneWrap opacity={exit}>
      <div style={{
        position:'absolute', width:500, height:500, borderRadius:'50%',
        background:'radial-gradient(circle, rgba(134,59,255,0.15) 0%, transparent 70%)',
        top:'50%', left:'50%', transform:'translate(-50%,-50%)',
        animation:'pulse-glow 3s ease-in-out infinite',
      }} />
      <div style={{
        width:120, height:120, marginBottom:36,
        opacity: exit, transform:`scale(${exit < 1 ? 0.8 : logoScale})`,
      }}>
        <svg viewBox="0 0 48 46" width="120" height="115">
          <path fill="#863bff" d="M25.946 44.938c-.664.845-2.021.375-2.021-.698V33.937a2.26 2.26 0 0 0-2.262-2.262H10.287c-.92 0-1.456-1.04-.92-1.788l7.48-10.471c1.07-1.497 0-3.578-1.842-3.578H1.237c-.92 0-1.456-1.04-.92-1.788L10.013.474c.214-.297.556-.474.92-.474h28.894c.92 0 1.456 1.04.92 1.788l-7.48 10.471c-1.07 1.498 0 3.579 1.842 3.579h11.377c.943 0 1.473 1.088.89 1.83L25.947 44.94z"/>
        </svg>
      </div>
      <div style={{
        fontSize:120, fontWeight:800, color:'#f1f5f9', letterSpacing:'0.04em',
        opacity: Math.min(logoOpacity, exit), marginBottom:20,
      }}>
        <span style={{ color:'#863bff' }}>Open</span>SiliconBet
      </div>
      <div style={{
        fontSize:48, fontWeight:300, color:'#94a3b8', letterSpacing:'0.15em',
        opacity: Math.min(subOpacity, exit),
        fontFamily:'"Noto Serif CJK SC","Source Han Serif SC",serif',
      }}>
        AI 时代的芯片思想实验
      </div>
    </SceneWrap>
  );
}

// ═══ Scene 2: Three Camps (6-14s) ═══
const CAMPS = [
  { id:'x86', label:'x86', sublabel:'Intel', color:'#3b82f6', stock:'+189% YTD' },
  { id:'arm', label:'ARM', sublabel:'Apple Silicon', color:'#22d3ee', stock:'+106% YTD' },
  { id:'riscv', label:'RISC-V', sublabel:'开源指令集', color:'#863bff', stock:'?' },
];

function CampCard({ camp, index }) {
  const { elapsed } = useSprite();
  const at = 0.7 + index * 0.6;
  const lt = Math.max(0, elapsed - at);
  const opacity = interpolate(lt, [0, 0.5], [0, 1], Easing.expoOut);
  const y = interpolate(lt, [0, 0.7], [50, 0], Easing.expoOut);
  const scale = interpolate(lt, [0, 0.7], [0.8, 1], Easing.overshoot);
  const sr = interpolate(lt, [0.7, 1.7], [0, 1], Easing.expoOut);

  return (
    <div style={{ display:'flex', flexDirection:'column', alignItems:'center', width:400, opacity, transform:`translateY(${y}px) scale(${scale})` }}>
      <div style={{
        width:130, height:130, borderRadius:'50%',
        background:`linear-gradient(135deg, ${camp.color}44, ${camp.color}22)`,
        border:`3px solid ${camp.color}66`,
        display:'flex', alignItems:'center', justifyContent:'center',
        fontSize:26, fontWeight:700, color:camp.color, marginBottom:20,
        fontFamily:'monospace', letterSpacing:'0.05em',
      }}>
        {camp.id === 'x86' ? 'x86' : camp.id === 'arm' ? 'ARM' : 'RV'}
      </div>
      <div style={{ fontSize:44, fontWeight:700, color:'#f1f5f9', marginBottom:6 }}>{camp.label}</div>
      <div style={{ fontSize:24, color:'#64748b', marginBottom:16 }}>{camp.sublabel}</div>
      <div style={{
        fontSize:56, fontWeight:800,
        color: camp.id === 'riscv' ? '#94a3b8' : '#22c55e',
        fontFamily:'monospace', opacity:sr, transform:`translateY(${interpolate(sr,[0,1],[10,0],Easing.expoOut)}px)`,
      }}>
        {camp.stock}
      </div>
    </div>
  );
}

function ThreeCampsScene() {
  const { elapsed } = useSprite();
  const qAppear = Math.max(0, elapsed - 4.5);
  const qOpacity = interpolate(qAppear, [0, 0.7], [0, 1], Easing.expoOut);
  const exit = elapsed > 7.0 ? interpolate(elapsed, [7.0, 8.0], [1, 0], Easing.expoOut) : 1;

  return (
    <SceneWrap opacity={exit}>
      <SectionLabel>AI AGENT 时代 · 当红炸子鸡</SectionLabel>
      <div style={{ display:'flex', gap:160, marginBottom:40, alignItems:'flex-start' }}>
        {CAMPS.map((c, i) => <CampCard key={c.id} camp={c} index={i} />)}
      </div>
      <div style={{
        fontSize:44, fontWeight:500, color:'#94a3b8', letterSpacing:'0.05em',
        opacity:qOpacity, transform:`translateY(${interpolate(qAppear,[0,0.5],[20,0],Easing.expoOut)}px)`,
      }}>
        开源 RISC-V，能否在巨头环伺中<span style={{ color:'#863bff', fontWeight:700 }}>杀出重围</span>？
      </div>
    </SceneWrap>
  );
}

// ═══ Scene 3: Characters (13-24s) ═══
const CHARACTERS = [
  { name:'Tim Cook', title:'前 ARM 阵营掌舵人', img:'frontend/src/assets/faces/cook.png', color:'#22d3ee', nameSize:34 },
  { name:'陈立武', title:'Intel CEO', img:'frontend/src/assets/faces/liptan.png', color:'#3b82f6', nameSize:34 },
  { name:'RISC-V 神秘嘉宾', title:'开源阵营', img:null, color:'#863bff', nameSize:28 },
  { name:'Lex Fridman', title:'主持人', img:'frontend/src/assets/faces/lex.png', color:'#f59e0b', nameSize:34 },
];

function CharCard({ char, index }) {
  const { elapsed } = useSprite();
  const at = 0.5 + index * 0.7;
  const lt = Math.max(0, elapsed - at);
  const opacity = interpolate(lt, [0, 0.6], [0, 1], Easing.expoOut);
  const y = interpolate(lt, [0, 0.7], [70, 0], Easing.expoOut);
  const scale = interpolate(lt, [0, 0.9], [0.7, 1], Easing.overshoot);
  const glow = interpolate(lt, [0.5, 1.2], [0, 0.5], Easing.expoOut);

  return (
    <div style={{ display:'flex', flexDirection:'column', alignItems:'center', width:280, opacity, transform:`translateY(${y}px) scale(${scale})` }}>
      <div style={{
        width:160, height:160, borderRadius:'50%', position:'relative', marginBottom:20,
        overflow:'hidden', border:`3px solid ${char.color}44`, boxShadow:`0 0 40px ${char.color}22`,
      }}>
        {char.img ? <img src={char.img} alt={char.name} className="face-img" />
          : <div className="face-placeholder" style={{ fontSize:48, background:`linear-gradient(135deg, ${char.color}88, ${char.color})` }}>?</div>}
        <div style={{ position:'absolute', inset:0, borderRadius:'50%', background:`radial-gradient(circle, ${char.color}44 0%, transparent 70%)`, opacity:glow }} />
      </div>
      <div style={{ fontSize:char.nameSize || 40, fontWeight:700, color:'#f1f5f9', marginBottom:4 }}>{char.name}</div>
      <div style={{ fontSize:24, color:'#64748b', fontWeight:300 }}>{char.title}</div>
    </div>
  );
}

function CharactersScene() {
  const { elapsed } = useSprite();
  const so = interpolate(elapsed, [0, 0.7], [0, 1], Easing.expoOut);
  const ca = Math.max(0, elapsed - 7.0);
  const clOp = interpolate(ca, [0, 0.9], [0, 1], Easing.expoOut);
  const exit = elapsed > 9.5 ? interpolate(elapsed, [9.5, 11.0], [1, 0], Easing.expoOut) : 1;

  return (
    <SceneWrap opacity={Math.min(so, exit)}>
      <SectionLabel>论战阵容</SectionLabel>
      <div style={{ display:'flex', gap:80, marginBottom:40 }}>
        {CHARACTERS.map((c, i) => <CharCard key={c.name} char={c} index={i} />)}
      </div>
      <div style={{
        fontSize:52, fontWeight:600, color:'#f1f5f9', letterSpacing:'0.08em',
        opacity:clOp, transform:`translateY(${interpolate(ca,[0,0.6],[24,0],Easing.expoOut)}px)`,
      }}>
        在 Lex 的主持下，<span style={{ color:'#863bff' }}>正面交锋</span>
      </div>
    </SceneWrap>
  );
}

  const flyIn = Math.max(0, elapsed - 0.5);
  const jOpacity = interpolate(flyIn, [0, 0.5], [0, 1], Easing.expoOut);
  const jScale = interpolate(flyIn, [0, 1.7], [0.6, 1], Easing.overshoot);
  const exit = elapsed > 8.5 ? interpolate(elapsed, [8.5, 9.5], [1, 0], Easing.expoOut) : 1;
  const cardOpacity = Math.min(jOpacity, exit);

  return (
    <div style={{
      position:'absolute', inset:0,
      display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
      background:'radial-gradient(ellipse at 40% 50%, #1e293b 0%, #0f172a 70%)',
      opacity:exit,
    }}>
      <div style={{
        fontSize:32, fontWeight:600, color:'#22d3ee', letterSpacing:'0.2em', marginBottom:28,
        opacity:cardOpacity, transform:`scale(${jScale})`,
        fontFamily:'"Noto Sans CJK SC",sans-serif',
      }}>
        神秘嘉宾 · 重磅加入
      </div>

      <div style={{
        display:'flex', flexDirection:'column', alignItems:'center',
        padding:'40px 72px',
        background:'rgba(255,255,255,0.03)', borderRadius:20,
        border:'1px solid rgba(255,255,255,0.1)',
        opacity:cardOpacity, transform:`scale(${jScale})`, position:'relative', overflow:'hidden',
      }}>
        {/* Top bar */}
        <div style={{
          position:'absolute', top:0, left:0, right:0,
          padding:'10px 16px 10px 36px',
          background:'rgba(0,0,0,0.3)', fontSize:16, color:'#94a3b8',
          display:'flex', justifyContent:'space-between',
        }}>
          <span>Jensen Huang · 视频通话</span>
          <span style={{ color:'rgba(255,255,255,0.3)' }}>●●●</span>
        </div>
        <div style={{ position:'absolute', top:10, left:16, display:'flex', gap:5 }}>
          <div style={{ width:10, height:10, borderRadius:'50%', background:'#22c55e' }} />
          <div style={{ width:10, height:10, borderRadius:'50%', background:'#22c55e', opacity:0.5 }} />
          <div style={{ width:10, height:10, borderRadius:'50%', background:'#22c55e', opacity:0.3 }} />
        </div>

        {/* Photo */}
        <div style={{
          width:220, height:220, borderRadius:'50%', margin:'36px 0 20px',
          overflow:'hidden', border:'3px solid rgba(34,211,238,0.4)',

        <div style={{ fontSize:24, color:'#64748b', fontWeight:300, marginBottom:18 }}>NVIDIA 创始人兼 CEO</div>

        {/* Tags — 整体出现 */}
        <div style={{ display:'flex', gap:16, flexWrap:'wrap', justifyContent:'center' }}>
          <span style={{
            padding:'8px 24px', borderRadius:24, fontSize:22, fontWeight:500,
            background:'rgba(34,211,238,0.1)', border:'1px solid rgba(34,211,238,0.25)', color:'#22d3ee',
            opacity:cardOpacity,

            登上空军一号造访北京
          </span>
          <span style={{
            padding:'8px 24px', borderRadius:24, fontSize:22, fontWeight:500,
            background:'rgba(34,211,238,0.1)', border:'1px solid rgba(34,211,238,0.25)', color:'#22d3ee',
            opacity:cardOpacity,
          }}>
            7 连涨 +20%
          </span>
        </div>

        {/* NVIDIA stock — 竖直排列 */}
        <div style={{
          display:'flex', flexDirection:'column', alignItems:'center', gap:4, marginTop:22,
          padding:'16px 36px', background:'rgba(34,211,238,0.06)',
          borderRadius:14, border:'1px solid rgba(34,211,238,0.15)',
          opacity:cardOpacity,
        }}>
          <span style={{ fontSize:16, color:'#64748b', fontWeight:500, letterSpacing:'0.15em' }}>NVDA</span>
          <span style={{ fontSize:40, fontWeight:800, color:'#22c55e', fontFamily:'monospace' }}>+20%</span>
          <span style={{ fontSize:18, color:'#94a3b8', fontWeight:400 }}>7 连涨 · 市值 $5.7 万亿</span>
        </div>
      </div>

      <div style={{
        fontSize:56, fontWeight:800, color:'#f1f5f9', marginTop:36, letterSpacing:'0.08em',
        opacity:cardOpacity, transform:`scale(${jScale})`,

// ═══ Scene 5: Closing (32-38s) ═══
function ClosingScene() {
  const { elapsed } = useSprite();
  const tOpacity = interpolate(elapsed, [0, 1.5], [0, 1], Easing.expoOut);
  const tagAt = Math.max(0, elapsed - 1.7);
  const bAt = Math.max(0, elapsed - 3.0);

  const faces = [
    { src:'frontend/src/assets/faces/cook.png', label:'Tim Cook' },
    { src:'frontend/src/assets/faces/liptan.png', label:'陈立武' },
    { src:null, label:'RISC-V' },
    { src:'frontend/src/assets/faces/lex.png', label:'Lex Fridman' },
    { src:'frontend/src/assets/faces/jensen.png', label:'Jensen Huang' },
  ];

  return (
    <SceneWrap>
      <div style={{
        display:'flex', gap:36, alignItems:'center', marginBottom:48,
        opacity:interpolate(elapsed,[0,1.2],[0,1],Easing.expoOut),
        transform:`translateY(${interpolate(elapsed,[0,1.2],[24,0],Easing.expoOut)}px)`,
      }}>
        {faces.map((f, i) => (
          <div key={i} style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:8 }}>
            <div style={{ width:80, height:80, borderRadius:'50%', overflow:'hidden', border:'2px solid rgba(134,59,255,0.3)' }}>
              {f.src ? <img src={f.src} alt={f.label} className="face-img" />
                : <div className="face-placeholder" style={{ fontSize:28, background:'linear-gradient(135deg, #6a1fdb, #863bff)' }}>?</div>}
            </div>
            <span style={{ fontSize:18, color:'#64748b' }}>{f.label}</span>
          </div>
        ))}
      </div>
      <div style={{
        fontSize:96, fontWeight:800, color:'#f1f5f9', letterSpacing:'0.04em',
        opacity:tOpacity, transform:`translateY(${interpolate(elapsed,[0,1.5],[36,0],Easing.expoOut)}px)`, marginBottom:24,
      }}>
        RISC-V，<span style={{ color:'#863bff' }}>能否杀出重围</span>？
      </div>
      <div style={{
        fontSize:36, fontWeight:500, color:'#64748b', letterSpacing:'0.1em',
        opacity:interpolate(tagAt,[0,0.8],[0,1],Easing.expoOut),
        fontFamily:'"Noto Serif CJK SC",serif', marginBottom:16,
      }}>
        一场 AI 驱动的芯片思想实验
      </div>
      <div style={{
        fontSize:56, fontWeight:800, color:'#f1f5f9', letterSpacing:'0.06em',
        opacity:interpolate(bAt,[0,0.8],[0,1],Easing.expoOut), marginTop:24,
      }}>
        Open<span style={{ color:'#863bff' }}>Silicon</span>Bet
        <span style={{ fontSize:28, fontWeight:300, color:'#64748b', marginLeft:20, letterSpacing:'0.05em' }}>不止是辩论</span>
      </div>
    </SceneWrap>
  );
}

// ═══ App ═══
function App() {
  const [fontsReady, setFontsReady] = useState(false);
  useEffect(() => {
    if (document.fonts && document.fonts.ready) document.fonts.ready.then(() => setFontsReady(true));
    else setFontsReady(true);
  }, []);

  if (!fontsReady) {
    return <div style={{ position:'fixed', inset:0, display:'flex', alignItems:'center', justifyContent:'center', background:'#0f172a', color:'#94a3b8', fontSize:16 }}>加载中...</div>;
  }

  return (
    <Stage duration={41} width={1920} height={1080} loop={true}>
      <Sprite start={0} end={6.5}><TitleScene /></Sprite>
      <Sprite start={6} end={14}><ThreeCampsScene /></Sprite>
      <Sprite start={13} end={24}><CharactersScene /></Sprite>
      <Sprite start={23} end={32.5}><JensenScene /></Sprite>
      <Sprite start={32} end={41}><ClosingScene /></Sprite>
    </Stage>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
